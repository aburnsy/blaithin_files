name: Nightly scrape
on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      force:
        description: "Force full re-scrape, ignoring the freshness gate"
        type: boolean
        default: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_SCRAPE: ${{ inputs.force }}
    strategy:
      matrix:
        site: [tullys, arboretum, carragh, gardens4you, quickcrop, hedgingie, david_austin, ballyrobert, brown_envelope, connecting_to_nature, howbert_mays, newlands, dutchgrown, fluwel]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: browser-actions/setup-chrome@v1
        if: matrix.site == 'quickcrop' || matrix.site == 'carragh' || matrix.site == 'arboretum' || matrix.site == 'tullys'
      - run: pip install -r requirements.txt
      - run: python load_bronze_data.py --site ${{ matrix.site }} || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.site }}
          path: data/${{ matrix.site }}/
          if-no-files-found: error
  match-and-commit:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { path: data }
      - name: Run matching pipeline (LLM fallback enabled)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python load_bronze_data.py --matching
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "nightly scrape $(date -u +%Y-%m-%d)"
          git push
